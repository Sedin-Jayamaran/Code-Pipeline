version: 0.2

env:
  variables:
    AWS_REGION: ap-south-1
    IMAGE_TAG: latest
    BASE_IMAGE: 156916773321.dkr.ecr.ap-south-1.amazonaws.com/jayamaran/sample-for-ecs:base
  parameter-store:
    ECR_REPO = "/jayamaran/my_ecr_repo"
    AWS_ACCOUNT_ID = "/jayamaran/aws_ID"  
    
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -f Dockerfile.app --build-arg BASE_IMAGE=$BASE_IMAGE -t $ECR_REPO:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $ECR_REPO:$IMAGE_TAG
      - echo Build and push complete.
      - echo Creating imagedefinitions.json...
      - printf '[{"name":"buggy-web","imageUri":"%s"}]' "$ECR_REPO:$IMAGE_TAG" > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
